<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuriUp - Mobile Experience</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* Custom Animations */
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob { animation: blob 7s infinite; }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }
        
        /* Fade In */
        .fade-in-up { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
    </style>
</head>
<body class="bg-slate-50 h-screen w-screen overflow-hidden relative selection:bg-emerald-100 selection:text-emerald-900">

    <div class="absolute inset-0 w-full h-full overflow-hidden z-0">
        <div class="absolute top-0 -left-4 w-72 h-72 bg-emerald-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob"></div>
        <div class="absolute top-0 -right-4 w-72 h-72 bg-cyan-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000"></div>
        <div class="absolute -bottom-8 left-20 w-72 h-72 bg-teal-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-4000"></div>
    </div>

    <div id="loading-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-white transition-opacity duration-500">
        <div class="relative flex flex-col items-center">
            <div class="relative w-24 h-24 mb-6">
                <div class="absolute inset-0 bg-emerald-100 rounded-full animate-ping opacity-75"></div>
                <img src="https://googleusercontent.com/profile/picture/0" alt="GuriUp Logo" class="relative w-24 h-24 rounded-full shadow-lg border-4 border-white object-cover">
            </div>
            
            <h1 class="text-2xl font-bold text-gray-900 mb-2 tracking-tight">GuriUp</h1>
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 bg-emerald-500 rounded-full animate-bounce"></div>
                <div class="w-2 h-2 bg-emerald-500 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
                <div class="w-2 h-2 bg-emerald-500 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
            </div>
        </div>
    </div>

    <div id="modal-overlay" class="hidden fixed inset-0 z-40 items-center justify-center p-4">
        
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm transition-opacity"></div>

        <div class="relative w-full max-w-md bg-white/80 backdrop-blur-xl rounded-3xl shadow-2xl border border-white/50 overflow-hidden fade-in-up">
            
            <div class="pt-8 pb-6 flex flex-col items-center text-center border-b border-gray-100/50">
                <img src="https://googleusercontent.com/profile/picture/0" alt="GuriUp Logo" class="w-20 h-20 rounded-full shadow-lg border-4 border-white mb-4 object-cover">
                <h2 class="text-2xl font-bold text-slate-800">GuriUp</h2>
                <p class="text-slate-500 text-sm font-medium">The modern platform for you</p>
            </div>

            <div class="p-8">
                <div class="text-center mb-6">
                    <p class="text-slate-600 text-lg leading-relaxed">
                        Hi there! It looks like you're browsing from <br>
                        <span id="device-name" class="font-bold text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded-md border border-emerald-100">a non-Android device</span>.
                    </p>
                </div>

                <div class="bg-gradient-to-r from-amber-50 to-orange-50 border border-amber-100 rounded-xl p-4 flex items-start gap-3 mb-6">
                    <div class="bg-amber-100 p-1.5 rounded-full shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-amber-600" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
                        </svg>
                    </div>
                    <div>
                        <h3 class="font-bold text-amber-900 text-sm">Android Exclusive</h3>
                        <p class="text-amber-800/80 text-sm mt-1">GuriUp is currently optimized specifically for the Android ecosystem.</p>
                    </div>
                </div>

                <p class="text-center text-xs text-slate-400 font-medium mb-6">
                    We are crafting the iOS and Web experience as we speak. Stay tuned!
                </p>

                <a href="https://play.google.com/store/apps/details?id=com.myguri.me" target="_blank" 
                   class="group flex items-center justify-center gap-2 w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3.5 px-4 rounded-xl transition-all shadow-lg shadow-emerald-600/20 active:scale-95">
                    <span>View on Google Play Store</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                    </svg>
                </a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var userAgent = navigator.userAgent || navigator.vendor || window.opera;
            
            // Elements
            var loader = document.getElementById('loading-screen');
            var modal = document.getElementById('modal-overlay');
            var deviceText = document.getElementById('device-name');

            // Simulate a minimum loading time for branding effect (optional, set to 800ms)
            // This ensures the user sees your logo before the redirect happens
            setTimeout(() => {
                
                // --- ANDROID DETECTED ---
                if (/android/i.test(userAgent)) {
                    // Redirect
                    window.location.replace("https://play.google.com/store/apps/details?id=com.myguri.me");
                } 
                // --- NOT ANDROID ---
                else {
                    // Update Text based on device
                    if (/iPad|iPhone|iPod/.test(userAgent)) {
                        deviceText.innerText = "an iPhone or iPad";
                    } else if (/Win/.test(userAgent)) {
                        deviceText.innerText = "Windows";
                    } else if (/Mac/.test(userAgent)) {
                        deviceText.innerText = "a Mac";
                    } else {
                        deviceText.innerText = "Desktop";
                    }

                    // Fade out loader
                    loader.style.opacity = '0';
                    setTimeout(() => {
                        loader.classList.add('hidden');
                        // Show Modal
                        modal.classList.remove('hidden');
                        modal.classList.add('flex');
                    }, 500); // Wait for fade out
                }

            }, 1000); // 1 second delay to show the branded loader
        });
    </script>
</body>
</html>
